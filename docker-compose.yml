version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: workspace-app
    container_name: workspace-app
    restart: unless-stopped
    volumes:
      - ./:/var/www
    networks:
      - workspace-network

  nginx:
    image: nginx:alpine
    container_name: workspace-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - workspace-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: workspace-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-workspace}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - workspace-network

networks:
  workspace-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
